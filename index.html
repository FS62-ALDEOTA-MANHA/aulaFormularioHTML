<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula Formulário HTML</title>
  <link rel="stylesheet" href="/styles/index.css">
</head>
<body>
  <main>
    <h1>Cadastro de Desenvolvedor</h1>
    <form>
      <div>
        <label class="block" for="nome">Nome completo</label>
        <input id="nome" name="nome" type="text" placeholder="Digite seu nome">
      </div>
      <div>
        <label class="block" for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Digite seu email">
      </div>
      <div>
        <label class="block" for="nasc">Data de Nascimento</label>
        <input type="date" name="dataNasc" id="nasc">
      </div>
      <div>
        <legend>Gênero</legend>
        <select name="genero" id="genero">
          <option>Selecione...</option>
          <option value="m">Masculino</option>
          <option value="f">Feminino</option>
        </select>
      </div>
      <div>
        <label class="block" for="senha">Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
      </div>
      <div>
        <legend>Stacks</legend>
        <input type="checkbox" name="html" id="html">
        <label for="html">HTML</label>
        <input type="checkbox" name="css" id="css">
        <label for="css">CSS</label>
        <input type="checkbox" name="js" id="js">
        <label for="js">JavaScript</label>
      </div>
      <div>
        <legend>Possui experiência?</legend>
        <input type="radio" name="xp" id="sim">
        <label for="sim">Sim</label>
        <input type="radio" name="xp" id="nao">
        <label for="nao">Não</label>
        <legend>Se sim, descreva:</legend>
        <textarea name="descXp" id="descXp" cols="30" rows="5"></textarea>
      </div>
      <button type="submit">Cadastrar</button>
    </form>
    <p>Possui cadastro? Faça o <a href="login.html">login</a></p>
  </main>
</body>
</html>
